<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JobTrack" />
    <meta name="application-name" content="JobTrack" />
    <meta name="theme-color" content="#111827" />
    <title>JobTrack</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="stylesheet" href="style1.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div id="loginCard">
            <p id="loginCompany">ElectricM8</p>
            <p id="loginTitle">Sign in to JobTrack</p>
            <p id="loginSub">Use your account credentials to continue</p>
            <div class="formGroup">
                <label class="formHeader">Email</label>
                <input type="email" id="loginEmail" class="newJobInput" placeholder="you@example.com" />
            </div>
            <div class="formGroup">
                <label class="formHeader">Password</label>
                <input type="password" id="loginPassword" class="newJobInput" placeholder="••••••••" />
            </div>
            <p id="loginError"></p>
            <button class="formButton" id="loginButton">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
            </button>
        </div>
    </div>

    <!-- TOP NAV -->
    <div id="topNavContainer">
        <span id="companyName">ElectricM8</span>
        <div id="welcomeMessage">
            <p id="welcomeTitle">Welcome back</p>
            <p id="welcomeSub">...</p>
        </div>
        <div id="openCloseNav">
            <i class="fa-solid fa-bars"></i>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div id="navOverlay"></div>
    <div id="navBar">
        <p id="navHeader">Menu</p>
        <div class="navItem" id="jobsSection">
            <i class="fa-solid fa-briefcase navIcon"></i>
            <span>Jobs</span>
        </div>
        <div class="navItem" id="createJobSection">
            <i class="fa-solid fa-plus navIcon"></i>
            <span>Create Job</span>
        </div>
        <div class="navItem" id="logoutButton">
            <i class="fa-solid fa-arrow-right-from-bracket navIcon"></i>
            <span>Sign Out</span>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="jobLists">
        <div class="jobCard" id="addJob">
            <div id="addJobInner">
                <div id="addJobIcon">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <div id="addJobText">
                    <p id="addJobTitle">New Job</p>
                    <p id="addJobSub">Tap to create a new job</p>
                </div>
            </div>
        </div>
        <p id="sectionTitle">Active Jobs</p>
        <div id="jobCardsContainer"></div>
    </div>

    <!-- NEW JOB FORM -->
    <div id="newJobForm">
        <div id="formCard">
            <div id="formTitleRow">
                <p id="formTitle">Create New Job</p>
                <div id="formClose"><i class="fa-solid fa-xmark"></i></div>
            </div>
            <div class="formGroup">
                <label class="formHeader">Job Name</label>
                <input placeholder="e.g. Kitchen Rewire" class="newJobInput" id="inputJobName" />
            </div>
            <div class="formGroup">
                <label class="formHeader">Address</label>
                <input placeholder="e.g. 12 Example St" class="newJobInput" id="inputAddress" />
            </div>
            <div class="formGroup">
                <label class="formHeader">Client Name</label>
                <input placeholder="e.g. John Smith" class="newJobInput" id="inputClientName" />
            </div>
            <div class="formGroup">
                <label class="formHeader">Start Date</label>
                <input type="date" class="newJobInput" id="startDate" />
            </div>
            <div class="formGroup">
                <label class="formHeader">Stock</label>
                <input placeholder="e.g. Cable, switches" class="newJobInput" id="inputStock" />
            </div>
            <div class="formGroup">
                <label class="formHeader">Notes</label>
                <textarea placeholder="Any additional notes" id="notesInput"></textarea>
            </div>
            <button class="formButton" id="newJobButton">
                <i class="fa-solid fa-check"></i> Create Job
            </button>
        </div>
    </div>

    <!-- JOB DETAIL PANEL -->
    <div id="jobDetail">
        <div id="jobDetailCard">

            <!-- Header -->
            <div id="jobDetailHeader">
                <div id="jobDetailBack">
                    <i class="fa-solid fa-arrow-left"></i>
                </div>
                <p id="jobDetailTitle">Job Details</p>
                <div id="jobDetailEditToggle">
                    <i class="fa-solid fa-pen"></i>
                </div>
            </div>

            <!-- Clock In/Out -->
            <div id="clockSection">
                <button id="clockButton">
                    <i class="fa-solid fa-clock"></i>
                    <span id="clockButtonText">Clock In</span>
                </button>
                <p id="clockStatus"></p>
                <p id="totalTimeDisplay"></p>
            </div>

            <!-- Job Info (view mode) -->
            <div id="jobDetailView">
                <div class="detailRow">
                    <span class="detailLabel">Job Name</span>
                    <span class="detailValue" id="detailJobName"></span>
                </div>
                <div class="detailRow">
                    <span class="detailLabel">Address</span>
                    <span class="detailValue" id="detailAddress"></span>
                </div>
                <div class="detailRow">
                    <span class="detailLabel">Client</span>
                    <span class="detailValue" id="detailClientName"></span>
                </div>
                <div class="detailRow">
                    <span class="detailLabel">Start Date</span>
                    <span class="detailValue" id="detailStartDate"></span>
                </div>
                <div class="detailRow">
                    <span class="detailLabel">Stock</span>
                    <span class="detailValue" id="detailStock"></span>
                </div>
                <div class="detailRow">
                    <span class="detailLabel">Notes</span>
                    <span class="detailValue" id="detailNotes"></span>
                </div>
                <div class="detailRow">
                    <span class="detailLabel">Status</span>
                    <span class="detailValue" id="detailStatus"></span>
                </div>
            </div>

            <!-- Job Info (edit mode) -->
            <div id="jobDetailEdit" style="display:none;">
                <div class="formGroup">
                    <label class="formHeader">Job Name</label>
                    <input class="newJobInput" id="editJobName" />
                </div>
                <div class="formGroup">
                    <label class="formHeader">Address</label>
                    <input class="newJobInput" id="editAddress" />
                </div>
                <div class="formGroup">
                    <label class="formHeader">Client Name</label>
                    <input class="newJobInput" id="editClientName" />
                </div>
                <div class="formGroup">
                    <label class="formHeader">Start Date</label>
                    <input type="date" class="newJobInput" id="editStartDate" />
                </div>
                <div class="formGroup">
                    <label class="formHeader">Stock</label>
                    <input class="newJobInput" id="editStock" />
                </div>
                <div class="formGroup">
                    <label class="formHeader">Notes</label>
                    <textarea class="newJobInput" id="editNotes" style="height:24vw; padding-top:3vw; resize:none;"></textarea>
                </div>
                <button class="formButton" id="saveEditButton">
                    <i class="fa-solid fa-check"></i> Save Changes
                </button>
            </div>

            <!-- Complete Job Button -->
            <button class="formButton" id="completeJobButton" style="background-color:#16a34a; margin-top: 3vw;">
                <i class="fa-solid fa-flag-checkered"></i> Complete Job
            </button>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
